<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnitrix Pookie Adventure</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========================= -->
<!-- NAME SCREEN -->
<!-- ========================= -->

<section id="nameScreen" class="screen active">

    <div class="card">

        <h1>💙 Welcome Pookie 💙</h1>

        <p>
            Enter your name to start the adventure
        </p>

        <input
            type="text"
            id="playerName"
            placeholder="Enter Your Name"
        >

        <button id="startBtn">
            Start Adventure 🚀
        </button>

    </div>

</section>


<!-- ========================= -->
<!-- CHARACTER SELECTION -->
<!-- ========================= -->

<section id="selectionScreen" class="screen">

    <h1 class="sectionTitle">
        Select Your Character
    </h1>

    <div class="characterPreview">

        <img
            id="characterImage"
            src=""
            alt=""
        >

        <h2 id="characterName">
            Tap Omnitrix
        </h2>

    </div>

    <!-- YOUR OMNITRIX IMAGE -->

    <img
        id="omnitrix"
        src="./Omnitrix.jpg"
        alt="Omnitrix"
    >

    <button id="selectCharacterBtn">

        Select Character ⚡

    </button>

</section>


<!-- ========================= -->
<!-- GAME SCREEN -->
<!-- ========================= -->

<section id="gameScreen" class="screen">

    <div class="gameHeader">

        <div>

            Level :
            <span id="levelText">
                1
            </span>

        </div>

        <div>

            Score :
            <span id="scoreText">
                0
            </span>

        </div>

    </div>

    <div id="omnitrixMessage">

        ⚡ Select Your Character

    </div>

    <!-- SMALL OMNITRIX -->

    <img
        id="gameOmnitrix"
        src="omnitrix.png"
        alt=""
    >

    <canvas
        id="gameCanvas"
        width="450"
        height="700">
    </canvas>

    <div class="mobileControls">

        <button id="leftBtn">
            ⬅
        </button>

        <button id="shootBtn">
            🔫
        </button>

        <button id="rightBtn">
            ➡
        </button>

    </div>

</section>


<!-- ========================= -->
<!-- LEVEL COMPLETE -->
<!-- ========================= -->

<div id="levelPopup" class="popup">

    <div class="popupCard">

        <h1>
            🎉 Mission Complete
        </h1>

        <p>

            Claim Your Secret Reward

        </p>

        <button id="claimRewardBtn">

            Claim Reward 🎁

        </button>

    </div>

</div>


<!-- ========================= -->
<!-- REWARD SCREEN -->
<!-- ========================= -->

<section id="rewardScreen" class="screen">

    <h1>
        Choose Your Secret Box 🎁
    </h1>

    <div class="boxContainer">

        <div class="rewardBox">
            📦
        </div>

        <div class="rewardBox">
            📦
        </div>

        <div class="rewardBox">
            📦
        </div>

    </div>

    <div class="rewardArea">

        <img
            id="rewardPokemon"
            src=""
            alt=""
        >

        <h2 id="complimentText">

        </h2>

    </div>

    <button id="playAgainBtn">

        Play Again ❤️

    </button>

</section>


<!-- ========================= -->
<!-- AUDIO -->
<!-- ========================= -->

<audio id="shootSound"></audio>

<audio id="rewardSound"></audio>

<script src="script.js"></script>

</body>
</html>
