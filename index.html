<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnitrix Pookie Adventure</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ========================= -->
<!-- NAME SCREEN -->
<!-- ========================= -->

<section id="nameScreen" class="screen active">

    <div class="card">

        <h1>💙 Welcome Pookie 💙</h1>

        <p>Enter your name to start adventure</p>

        <input
            type="text"
            id="playerName"
            placeholder="Enter Your Name"
        >

        <button id="startBtn">
            Start Adventure 🚀
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- CHARACTER SCREEN -->
<!-- ========================= -->

<section id="selectionScreen" class="screen">

    <h1 class="sectionTitle">
        Select Your Character
    </h1>

    <div class="characterPreview">

        <img
            id="characterImage"
            src=""
            alt=""
        >

        <h2 id="characterName">
            Tap Omnitrix
        </h2>

    </div>

    <img
        id="omnitrix"
        src="Omnitrix.jpg"
        alt="Omnitrix"
    >

    <button id="selectCharacterBtn">
        Start Game ⚡
    </button>

</section>

<!-- ========================= -->
<!-- GAME SCREEN -->
<!-- ========================= -->

<section id="gameScreen" class="screen">

    <div class="gameHeader">

        <div>
            Level :
            <span id="levelText">1</span>
        </div>

        <div>
            Score :
            <span id="scoreText">0</span>
        </div>

    </div>

    <div id="omnitrixMessage">
        ⚡ Character Ready
    </div>

    <img
        id="gameOmnitrix"
        src="omnitrix.png"
        alt=""
    >

    <canvas
        id="gameCanvas"
        width="450"
        height="700">
    </canvas>

    <div class="mobileControls">

        <button id="leftBtn">
            ⬅
        </button>

        <button id="shootBtn">
            🔫
        </button>

        <button id="rightBtn">
            ➡
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- LEVEL COMPLETE POPUP -->
<!-- ========================= -->

<div id="levelPopup" class="popup">

    <div class="popupCard">

        <h1>
            🎉 Mission Complete
        </h1>

        <p>
            Your Secret Reward Awaits
        </p>

        <button id="claimRewardBtn">
            Continue 💙
        </button>

    </div>

</div>

<!-- ========================= -->
<!-- STORY SCREEN -->
<!-- ========================= -->

<section id="storyScreen" class="screen">

    <div class="storyContainer">

        <h1>
            💌 A Little Message
        </h1>

        <p id="storyText"></p>

        <button
            id="missBtn"
            class="hidden"
        >
            Click To See How Much I Missed You 💙
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- MISS YOU SCREEN -->
<!-- ========================= -->

<section id="missScreen" class="screen">

    <div class="storyContainer">

        <img
            id="teddyImg"
            src="teddy.png"
            alt="Teddy Bear"
        >

        <h1 id="counter">
            0
        </h1>

        <p>
            This Much I Missed You ♾️
        </p>

        <button id="loveBtn">
            Click To See My Love ❤️
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- LOVE SCREEN -->
<!-- ========================= -->

<section id="loveScreen" class="screen">

    <div class="storyContainer">

        <div class="heart">
            ❤️
        </div>

        <p id="loveMessage">

        </p>

        <button id="specialBtn">
            Special Message 🐼
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- PANDA SCREEN -->
<!-- ========================= -->

<section id="pandaScreen" class="screen">

    <div class="storyContainer">

        <img
            id="pandaImg"
            src="heart.jpg"
            alt="Cute Panda"
        >

        <p id="finalMsg">

        </p>

        
        
        <button id="togetherBtn">
    💙 Us Together 💙
</button>


    </div>

</section>
<section id="togetherScreen" class="screen">

    <div class="togetherCard">

        <h1 class="togetherTitle">
            💙 Us Together 💙
        </h1>

        <img
        id="coupleImage"
        src="ours.png"
        >

        <p id="togetherText"></p>

     

    </div>

       

</section>


<!-- ========================= -->
<!-- MUSIC -->
<!-- ========================= -->

<audio
    id="bgMusic"
    loop
>
    <source
        src="music.mp3"
        type="audio/mpeg"
    >
</audio>

<script src="script.js"></script>

</body>
</html>
